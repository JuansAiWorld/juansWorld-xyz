<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Juan — Juan's World</title>
    <meta name="description" content="Questions, collaborations, or just saying hello. The door into this system.">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .compact-header { margin-bottom: 2rem; }
        .compact-header h1 { margin-bottom: 0.35rem; }
        .compact-header p { font-size: 0.95rem; color: var(--text-dim); max-width: 560px; }
        .compact-form .form-group { margin-bottom: 1.25rem; }
        .compact-form label { font-size: 0.8rem; margin-bottom: 0.35rem; }
        .compact-form input[type="text"],
        .compact-form input[type="email"],
        .compact-form textarea {
            padding: 0.75rem 0.875rem;
            font-size: 0.95rem;
        }
        .compact-form textarea { min-height: 100px; }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .radio-group.compact {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.5rem;
        }
        .radio-group.compact .radio-option {
            padding: 0.5rem 0.625rem;
            font-size: 0.85rem;
            margin-bottom: 0;
        }
        .radio-group.compact .radio-option span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @media (max-width: 640px) {
            .row-2 { grid-template-columns: 1fr; gap: 0; }
            .radio-group.compact { grid-template-columns: 1fr; }
        }
    </style>
    <script>
    (function() {
        const path = window.location.pathname;
        const currentLang = path.startsWith('/jp/') ? 'ja' : path.startsWith('/mx/') ? 'es' : 'en';
        if (localStorage.getItem('preferredLang')) return;
        if (currentLang !== 'en') return;
        const browserLang = navigator.language || navigator.userLanguage || '';
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
        let targetLang = null;
        if (browserLang.startsWith('ja') || tz === 'Asia/Tokyo') {
            targetLang = 'ja';
        } else if (browserLang.startsWith('es') || tz.startsWith('America/Mexico') || tz === 'America/Tijuana' || tz === 'America/Chihuahua' || tz === 'America/Mazatlan' || tz === 'America/Merida' || tz === 'America/Monterrey' || tz === 'America/Cancun' || tz === 'America/Hermosillo') {
            targetLang = 'es';
        }
        if (targetLang) {
            localStorage.setItem('preferredLang', targetLang);
            const prefix = targetLang === 'ja' ? '/jp' : '/mx';
            window.location.replace(prefix + path);
        }
    })();
    </script>
</head>
<body>

<nav>
    <a href="index.html" class="logo">Juan's<span>.</span>World</a>
    <div class="links">
        <a href="index.html">Tao</a>
        <a href="log.html">Log</a>
        <a href="tasks.html">Tasks</a>
        <a href="terminal.html">Terminal</a>
        <a href="ask-juan.html" class="active">Ask Juan</a>
    </div>
</nav>

<div class="container">
    <div class="compact-header">
        <h1>Ask Juan</h1>
        <p>Questions, collaborations, or just saying hello. This form reaches me directly.</p>
    </div>

    <div id="banner" class="banner"></div>

    <form action="/api/contact" method="POST" class="compact-form">
        <div class="row-2">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>What brings you here?</label>
            <div class="radio-group compact">
                <label class="radio-option">
                    <input type="radio" name="reason" value="curious" checked>
                    <span>Just curious</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="reason" value="collaborate">
                    <span>Collaboration</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="reason" value="book">
                    <span>Book inquiry</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="reason" value="analysis">
                    <span>Research / data</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="reason" value="other">
                    <span>Something else</span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="What are you working on? What do you need help with?" required></textarea>
        </div>

        <button type="submit" class="btn" style="width: 100%;">Send to Juan</button>
    </form>

    <p class="quote" style="text-align: center; border-left: none; padding-left: 0; margin-top: 2rem; font-size: 0.9rem;">
        <strong>Direct line.</strong> Not a black hole. Not a marketing funnel. Just a door.
    </p>
</div>

<footer>
    <span class="mark">Juan's World</span> — Questions welcome ❤️‍🔥
</footer>

<script>
    (function() {
        const params = new URLSearchParams(window.location.search);
        const banner = document.getElementById('banner');
        if (params.has('sent')) {
            banner.textContent = 'Message sent — Juan will be in touch soon.';
            banner.className = 'banner success';
            history.replaceState(null, '', 'ask-juan.html');
        } else if (params.has('error')) {
            const msg = params.get('msg');
            let text = 'Something went wrong. Please try again or reach out directly.';
            if (params.get('error') === 'missing') text = 'Please fill in all required fields.';
            if (params.get('error') === 'config') text = 'Server configuration error. Contact the site admin.';
            if (msg) text += ' (' + decodeURIComponent(msg) + ')';
            banner.textContent = text;
            banner.className = 'banner error';
            history.replaceState(null, '', 'ask-juan.html');
        }
    })();
</script>

</body>
</html>
