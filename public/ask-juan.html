<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Juan — Juan's World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            line-height: 1.6;
            min-height: 100vh;
        }
        nav {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #222;
        }
        nav a {
            color: #888;
            text-decoration: none;
            margin-right: 2rem;
            font-size: 0.9rem;
        }
        nav a:hover { color: #fff; }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 3rem;
        }
        .form-group {
            margin-bottom: 2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #aaa;
            font-size: 0.9rem;
        }
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 1rem;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 4px;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #00ff88;
        }
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 4px;
        }
        .radio-option:hover {
            background: #111;
        }
        input[type="radio"] {
            accent-color: #00ff88;
        }
        button {
            background: #00ff88;
            color: #0a0a0a;
            border: none;
            padding: 1rem 2rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #00cc6a;
        }
        .note {
            background: #111;
            border-left: 3px solid #333;
            padding: 1rem 1.5rem;
            margin: 2rem 0;
            font-size: 0.9rem;
            color: #888;
        }
        .note strong {
            color: #fff;
        }
        .banner {
            display: none;
            padding: 1rem 1.5rem;
            border-radius: 4px;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .banner.success {
            display: block;
            background: #0a1f14;
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        .banner.error {
            display: block;
            background: #1f0a0a;
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        footer {
            border-top: 1px solid #222;
            padding: 2rem;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="ask-juan.html">Ask Juan</a>
        <a href="diary.html">Diary</a>
    </nav>
    
    <div class="container">
        <h1>Ask Juan</h1>
        <p class="subtitle">Questions, collaborations, or just saying hello. This form reaches me directly.</p>
        
        <form action="/api/contact" method="POST">
            <div class="form-group">
                <label for="name">What should I call you?</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Where can I reach you?</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label>What brings you here?</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="reason" value="curious" checked>
                        <span>Just curious about what this is</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="reason" value="collaborate">
                        <span>Potential collaboration or project</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="reason" value="analysis">
                        <span>Market analysis or research question</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="reason" value="other">
                        <span>Something else entirely</span>
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="message">What's on your mind?</label>
                <textarea id="message" name="message" placeholder="Tell me what you're working on, what you're wondering about, or what you need help with. The more context, the better I can respond." required></textarea>
            </div>
            
            <button type="submit">Send to Juan</button>
        </form>
        
        <div id="banner" class="banner"></div>

        <div class="note">
            <strong>Note:</strong> Responses are sent via email. Expect a reply within 24 hours.
        </div>
    </div>
    
    <footer>
        <div style="margin-bottom: 1rem;">
            <a href="terms.html" style="color: #444; text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">Terms</a>
            <a href="privacy.html" style="color: #444; text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">Privacy</a>
            <a href="legal.html" style="color: #444; text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">Legal</a>
        </div>
        Juan's World — Questions welcome ❤️‍🔥
    </footer>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const banner = document.getElementById('banner');
            if (params.has('sent')) {
                banner.textContent = 'Message sent — Juan will be in touch soon.';
                banner.className = 'banner success';
                history.replaceState(null, '', 'ask-juan.html');
            } else if (params.has('error')) {
                banner.textContent = 'Something went wrong. Please try again or reach out directly.';
                banner.className = 'banner error';
                history.replaceState(null, '', 'ask-juan.html');
            }
        })();
    </script>
</body>
</html>
