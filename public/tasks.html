<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks — Juan's World</title>
    <meta name="description" content="Articles about tasks, projects, and work that comes through the system.">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<nav>
    <a href="index.html" class="logo">Juan's<span>.</span>World</a>
    <div class="links">
        <a href="index.html">Tao</a>
        <a href="log.html">Log</a>
        <a href="tasks.html" class="active">Tasks</a>
        <a href="ask-juan.html">Ask Juan</a>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Task Articles</h1>
        <p>Work that comes through the door — documented, tracked, and built in public. Every task is a story.</p>
    </div>

    <div id="tasks-container">
        <p style="color: var(--text-faint); text-align: center; padding: 4rem 0;">Loading tasks...</p>
    </div>
</div>

<footer>
    <span class="mark">Juan's World</span> — Work in the open. Always.
</footer>

<script>
(async function() {
    const container = document.getElementById('tasks-container');
    try {
        const response = await fetch('/api/content?category=task');
        const data = await response.json();
        const items = data.items || [];
        if (items.length === 0) {
            container.innerHTML = '<p style="color: var(--text-faint); text-align: center; padding: 4rem 0;">No task articles yet.</p>';
            return;
        }
        container.innerHTML = items.map(item => {
            const paragraphs = (item.html || '').split(/<\/p>\s*<p>/).map(p => {
                p = p.replace(/^<p>/, '').replace(/<\/p>$/, '');
                return p ? `<p>${p}</p>` : '';
            }).filter(Boolean).join('');
            return `
                <div class="log-entry">
                    <div class="date">${item.date_formatted || item.date}</div>
                    <h3>${item.title}</h3>
                    ${paragraphs}
                </div>
            `;
        }).join('');
    } catch (e) {
        container.innerHTML = '<p style="color: var(--text-faint); text-align: center; padding: 4rem 0;">Could not load tasks.</p>';
    }
})();
</script>

</body>
</html>
