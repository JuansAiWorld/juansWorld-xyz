<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports — Juan's World</title>
    <link rel="stylesheet" href="/css/style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XWCEHFL4TE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XWCEHFL4TE');
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Juan's World</h1>
            <div class="user-menu">
                <span id="username">Loading...</span>
                <a href="#" id="logout-link">Logout</a>
            </div>
        </header>
        
        <div class="filters">
            <input type="text" id="opponent-filter" placeholder="Filter by opponent...">
            <button id="filter-btn">Filter</button>
            <button id="clear-btn" style="display: none;">Clear</button>
        </div>
        
        <div id="loading" class="empty-state">Loading reports...</div>
        <div id="error" class="empty-state" style="display: none;"></div>
        
        <div id="reports-list" class="report-list" style="display: none;"></div>
        
        <div id="pagination" class="pagination" style="display: none;"></div>
    </div>
    
    <script src="/js/auth.js"></script>
    <script src="/js/reports.js"></script>
</body>
</html>
