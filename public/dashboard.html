<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Juan's World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            line-height: 1.7;
            min-height: 100vh;
        }
        nav {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        nav a {
            color: #888;
            text-decoration: none;
            margin-right: 2rem;
            font-size: 0.9rem;
            padding: 0.5rem 0;
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        nav a:hover { color: #fff; }
        nav a.active { color: #00ff88; }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 1.5rem;
        }
        .card h2 {
            font-size: 1rem;
            color: #00ff88;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid #1a1a1a;
            cursor: pointer;
        }
        .card-item:last-child { border-bottom: none; }
        .card-item:hover { background: #161616; }
        .card-item-title {
            color: #e0e0e0;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        .card-item-meta {
            color: #555;
            font-size: 0.8rem;
        }
        .card-item-badge {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
            text-transform: uppercase;
        }
        .badge-pdf { background: rgba(0,255,136,0.1); color: #00ff88; border: 1px solid #00ff8833; }
        .badge-brief { background: rgba(100,150,255,0.1); color: #6496ff; border: 1px solid #6496ff33; }
        .badge-update { background: rgba(255,170,0,0.1); color: #ffaa00; border: 1px solid #ffaa0033; }
        .badge-report { background: rgba(200,100,255,0.1); color: #c864ff; border: 1px solid #c864ff33; }
        .empty {
            color: #444;
            font-size: 0.9rem;
            font-style: italic;
            padding: 1rem 0;
        }
        .loading { color: #444; font-size: 0.9rem; }
        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .nav-right span {
            color: #555;
            font-size: 0.85rem;
        }
        .nav-right a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .nav-right a:hover { color: #fff; }
        footer {
            border-top: 1px solid #222;
            padding: 2rem;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
            margin-top: 4rem;
        }
        .hero-brief {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .hero-brief h2 {
            font-size: 1rem;
            color: #6496ff;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hero-brief p {
            color: #bbb;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .hero-brief a {
            color: #00ff88;
            text-decoration: none;
            font-size: 0.85rem;
        }
    
        @media (max-width: 768px) {
            nav { padding: 1rem; }
            nav a { margin-right: 1rem; font-size: 0.85rem; }
            h1 { font-size: 2rem !important; }
            .container { padding: 2rem 1rem !important; }
            .hero { padding: 2rem 1rem !important; }
            .layout { padding: 1rem !important; }
            .grid { grid-template-columns: 1fr !important; }
            .card { padding: 1rem !important; }
        }
            .lang-switch {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            color: #555;
            font-size: 0.85rem;
        }
        .lang-switch a {
            color: #888;
            text-decoration: none;
        }
        .lang-switch a:hover { color: #00ff88; }
</style>
</head>
<body>
    <div class="lang-switch">
        <span style="color:#00ff88;">EN</span> / <a href="/jp/index.html">JP</a>
    </div>
    <nav>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="diary.html">Diary</a>
        <a href="ask-juan.html">Ask Juan</a>
        <div class="nav-right">
            <span id="user-name"></span>
            <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
            <a href="#" id="logout-link">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1>Dashboard</h1>
        <p class="subtitle">Your briefing center — reports, updates, and intelligence.</p>

        <div class="grid">
            <div class="card">
                <h2>My Reports</h2>
                <div id="reports-list" class="loading">Loading...</div>
            </div>
            <div class="card">
                <h2>Recent Updates</h2>
                <div id="updates-list" class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <footer>
        <div style="margin-bottom: 1rem;">
            <a href="terms.html" style="color: #444; text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">Terms</a>
            <a href="privacy.html" style="color: #444; text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">Privacy</a>
            <a href="legal.html" style="color: #444; text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">Legal</a>
        </div>
        Juan's World — Memory is sacred ❤️‍🔥
    </footer>

    <script src="/js/auth.js"></script>
    <script>
        let userRole = 'user';

        document.addEventListener('DOMContentLoaded', async () => {
            const isAuthed = await checkAuth();
            if (!isAuthed) {
                window.location.href = '/login.html';
                return;
            }
            loadDashboard();
        });

        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/content`, {
                    credentials: 'same-origin'
                });
                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '/login.html';
                        return;
                    }
                    throw new Error('Failed to load');
                }
                const data = await response.json();
                userRole = data.role;

                document.getElementById('user-name').textContent = data.user || 'Guest';
                if (userRole === 'admin') {
                    document.getElementById('admin-link').style.display = 'inline';
                }

                renderBriefs(data.items);
                renderReports(data.items);
                renderUpdates(data.items);
            } catch (e) {
                console.error(e);
                document.getElementById('reports-list').innerHTML = '<div class="empty">Error loading reports.</div>';
                document.getElementById('updates-list').innerHTML = '<div class="empty">Error loading updates.</div>';
            }
        }

        function renderBriefs(items) {
            const briefs = items.filter(i => i.category === 'brief');
            if (briefs.length === 0) return;
            const latest = briefs[0];
            const el = document.getElementById('latest-brief');
            el.style.display = 'block';

            // Strip HTML tags for preview
            const tmp = document.createElement('div');
            tmp.innerHTML = latest.html || latest.title;
            const text = tmp.textContent || tmp.innerText || '';
            document.getElementById('brief-preview').textContent = text.slice(0, 200) + (text.length > 200 ? '...' : '');
        }

        function renderReports(items) {
            const reports = items.filter(i => i.category === 'report');
            const list = document.getElementById('reports-list');
            if (reports.length === 0) {
                list.innerHTML = '<div class="empty">No reports assigned yet.</div>';
                return;
            }
            list.innerHTML = reports.slice(0, 8).map(r => `
                <div class="card-item" onclick="location.href='report.html?id=${encodeURIComponent(r.slug)}'">
                    <div class="card-item-title">${escapeHtml(r.title)} <span class="card-item-badge badge-${r.type === 'pdf' ? 'pdf' : 'report'}">${r.type === 'pdf' ? 'PDF' : 'Report'}</span></div>
                    <div class="card-item-meta">${escapeHtml(r.date_formatted)}</div>
                </div>
            `).join('');
        }

        function renderUpdates(items) {
            const updates = items.filter(i => i.category === 'update');
            const list = document.getElementById('updates-list');
            if (updates.length === 0) {
                list.innerHTML = '<div class="empty">No updates yet.</div>';
                return;
            }
            list.innerHTML = updates.slice(0, 8).map(u => `
                <div class="card-item" onclick="location.href='report.html?id=${encodeURIComponent(u.slug)}'">
                    <div class="card-item-title">${escapeHtml(u.title)} <span class="card-item-badge badge-update">Update</span></div>
                    <div class="card-item-meta">${escapeHtml(u.date_formatted)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
