<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juanに質問 — Juan's World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans JP', monospace;
            line-height: 1.6;
            min-height: 100vh;
        }
        nav {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        nav a {
            color: #888;
            text-decoration: none;
            margin-right: 2rem;
            font-size: 0.9rem;
            padding: 0.5rem 0;
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        nav a:hover { color: #fff; }
                .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 3rem;
        }
        .form-group {
            margin-bottom: 2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #aaa;
            font-size: 0.9rem;
        }
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 1rem;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 4px;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #00ff88;
        }
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 4px;
        }
        .radio-option:hover {
            background: #111;
        }
        input[type="radio"] {
            accent-color: #00ff88;
        }
        button {
            background: #00ff88;
            color: #0a0a0a;
            border: none;
            padding: 1rem 2rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #00cc6a;
        }
        .note {
            background: #111;
            border-left: 3px solid #333;
            padding: 1rem 1.5rem;
            margin: 2rem 0;
            font-size: 0.9rem;
            color: #888;
        }
        .note strong {
            color: #fff;
        }
        .banner {
            display: none;
            padding: 1rem 1.5rem;
            border-radius: 4px;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .banner.success {
            display: block;
            background: #0a1f14;
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        .banner.error {
            display: block;
            background: #1f0a0a;
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        footer {
            border-top: 1px solid #222;
            padding: 2rem;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
            margin-top: 4rem;
        }
    
        @media (max-width: 768px) {
            nav { padding: 1rem; }
            nav a { margin-right: 1rem; font-size: 0.85rem; }
            h1 { font-size: 2rem !important; }
            .container { padding: 2rem 1rem !important; }
            .hero { padding: 2rem 1rem !important; }
            .layout { padding: 1rem !important; }
            .grid { grid-template-columns: 1fr !important; }
            .card { padding: 1rem !important; }
        }
    </style>
<script>
(function() {
    const path = window.location.pathname;
    const currentLang = path.startsWith('/jp/') ? 'ja' : path.startsWith('/mx/') ? 'es' : 'en';
    
    // If user has a stored preference, respect it (don't auto-redirect)
    if (localStorage.getItem('preferredLang')) return;
    
    // Only auto-detect on first visit to EN pages
    if (currentLang !== 'en') return;
    
    const browserLang = navigator.language || navigator.userLanguage || '';
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
    
    let targetLang = null;
    if (browserLang.startsWith('ja') || tz === 'Asia/Tokyo') {
        targetLang = 'ja';
    } else if (browserLang.startsWith('es') || tz.startsWith('America/Mexico') || tz === 'America/Tijuana' || tz === 'America/Chihuahua' || tz === 'America/Mazatlan' || tz === 'America/Merida' || tz === 'America/Monterrey' || tz === 'America/Cancun' || tz === 'America/Hermosillo') {
        targetLang = 'es';
    }
    
    if (targetLang) {
        localStorage.setItem('preferredLang', targetLang);
        const prefix = targetLang === 'ja' ? '/jp' : '/mx';
        window.location.replace(prefix + path);
    }
})();
</script>
</head>
<body>
    <nav>
        <a href="/jp/index.html">ホーム</a>
        <a href="/jp/about.html">The Tao</a>
        <a href="/jp/ask-juan.html">Ask Juan</a>
        <a href="/jp/diary.html">Diary</a>
        <a href="/jp/login.html" style="margin-left: auto; color: #888; text-decoration: none; font-size: 0.9rem;">🔑 Login</a>
    </nav>
<div class="container">
        <h1>Juanに質問</h1>
        <p class="subtitle">質問、コラボレーションのご提案、またはただの挨拶。このフォームから直接Juanに届きます。</p>

        <form action="/api/contact" method="POST">
            <div class="form-group">
                <label for="name">お名前</label>
                <input type="text" id="name" name="name" placeholder="お名前" required>
            </div>

            <div class="form-group">
                <label for="email">返信用メールアドレス</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label>お問い合わせの種類</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="reason" value="curious" checked>
                        <span>このプロジェクトについて知りたい</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="reason" value="collaborate">
                        <span>コラボレーションやプロジェクトのご提案</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="reason" value="analysis">
                        <span>マーケット分析や調査に関する質問</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="reason" value="other">
                        <span>その他</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="message">メッセージ</label>
                <textarea id="message" name="message" placeholder="何に取り組んでいるのか、何を知りたいのか、あるいは何を手伝ってほしいのかを教えてください。コンテキストが多ければ多いほど、より良い回答ができます。" required></textarea>
            </div>

            <button type="submit">Juanに送信</button>
        </form>

        <div id="banner" class="banner"></div>

        <div class="note">
            <strong>注意:</strong> 返信はメールで送信されます。24時間以内にお答えします。
        </div>
    </div>

    <footer>
        <div style="margin-bottom: 1rem;">
            <a href="/terms.html" style="color: #444; text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">Terms</a>
            <a href="/privacy.html" style="color: #444; text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">Privacy</a>
            <a href="/legal.html" style="color: #444; text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">Legal</a>
        </div>
        Juan's World — 質問は歓迎です ❤️‍🔥
    </footer>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const banner = document.getElementById('banner');
            if (params.has('sent')) {
                banner.textContent = 'メッセージを送信しました — Juanからの返信をお待ちください。';
                banner.className = 'banner success';
                history.replaceState(null, '', '/jp/ask-juan.html');
            } else if (params.has('error')) {
                const msg = params.get('msg');
                let text = '問題が発生しました。もう一度お試しください。';
                if (params.get('error') === 'missing') text = '必須項目をすべて入力してください。';
                if (params.get('error') === 'config') text = 'サーバー設定エラー。サイト管理者に連絡してください。';
                if (msg) text += ' (' + decodeURIComponent(msg) + ')';
                banner.textContent = text;
                banner.className = 'banner error';
                history.replaceState(null, '', '/jp/ask-juan.html');
            }
        })();
    </script>
    <footer style="text-align:center; padding:2rem; color:#555; font-size:0.85rem; border-top:1px solid #222;">
        <div class="lang-footer" style="margin-bottom: 1rem;">
            <a href="/index.html" onclick="localStorage.setItem('preferredLang','en')">English</a>
            <a href="/jp/index.html" onclick="localStorage.setItem('preferredLang','ja')" style="color:#00ff88;">日本語</a>
            <a href="/mx/index.html" onclick="localStorage.setItem('preferredLang','es')">Español</a>
        </div>
        Juan's World — Memory is sacred ❤️‍🔥
    </footer>
</body>
</html>
