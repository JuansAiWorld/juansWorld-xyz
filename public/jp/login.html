<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン — Juan's World</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XWCEHFL4TE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XWCEHFL4TE');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans JP', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        .tagline {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .card {
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2rem;
            text-align: left;
        }
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .flash.error {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #888;
        }
        input {
            width: 100%;
            padding: 0.875rem;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 1rem;
            font-family: inherit;
            min-height: 48px;
        }
        input:focus {
            outline: none;
            border-color: #00ff88;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: #00ff88;
            border: 1px solid #00ff88;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            min-height: 48px;
        }
        button:hover {
            background: #00ff88;
            color: #0a0a0a;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #555;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .back-link:hover {
            color: #fff;
        }
        .lang-switch {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            color: #555;
            font-size: 0.85rem;
        }
        .lang-switch a {
            color: #888;
            text-decoration: none;
        }
        .lang-switch a:hover { color: #00ff88; }
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="/login.html">English</a> / <span style="color:#00ff88;">日本語</span>
    </div>

    <div class="login-box">
        <h1>Juan's World</h1>
        <p class="tagline">メンバー専用レポート</p>

        <div class="card">
            <div id="error-message" class="flash error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">ユーザー名</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit">ログイン</button>
            </form>
        </div>

        <a href="/jp/index.html" class="back-link">← ホームに戻る</a>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
