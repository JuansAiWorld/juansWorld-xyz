        .brief-content h3 {
            font-size: 1rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;

        }
        .brief-content p {
            margin-bottom: 1rem;
            color: #bbb;
        }
        .brief-content ul {

        .alert-box {
            background: #1a0a0a;
            border: 1px solid #ff444433;
            border-left: 3px solid #ff4444;
            padding: 1rem 1.25rem;
            border-radius: 4px;

        .alert-box h2 {

            padding-left: 0;

            margin-top: 0;

        table {
            width: 100%;

            margin: 1rem 0 1.5rem;
            font-size: 0.9rem;

        th, td {
            text-align: left;
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid #222;

        th {

        td {

        footer {

            padding: 2rem;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
            margin-top: 4rem;
        }
                @media (max-width: 768px) {

            .container { padding: 2rem 1rem !important; }

<script>
(function() {
    const path = window.location.pathname;
    const currentLang = path.startsWith('/jp/') ? 'ja' : path.startsWith('/mx/') ? 'es' : 'en';
    
    // If user has a stored preference, respect it (don't auto-redirect)
    if (localStorage.getItem('preferredLang')) return;
    
    // Only auto-detect on first visit to EN pages
    if (currentLang !== 'en') return;
    
    const browserLang = navigator.language || navigator.userLanguage || '';
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
    
    let targetLang = null;
    if (browserLang.startsWith('ja') || tz === 'Asia/Tokyo') {
        targetLang = 'ja';
    } else if (browserLang.startsWith('es') || tz.startsWith('America/Mexico') || tz === 'America/Tijuana' || tz === 'America/Chihuahua' || tz === 'America/Mazatlan' || tz === 'America/Merida' || tz === 'America/Monterrey' || tz === 'America/Cancun' || tz === 'America/Hermosillo') {
        targetLang = 'es';
    }
    
    if (targetLang) {
        localStorage.setItem('preferredLang', targetLang);
        const prefix = targetLang === 'ja' ? '/jp' : '/mx';
        window.location.replace(prefix + path);
    }
})();
</script>

    <script>
        let briefs = {};
        let currentYear = 2026;
        let currentMonth = 3;
        let selectedDate = null;

        function isBriefVisible(brief) {
            const now = new Date();
            if (brief.publishAt && new Date(brief.publishAt) > now) return false;
            if (brief.expireAt && new Date(brief.expireAt) <= now) return false;
            return true;
        }

        function getVisibleBriefs() {
            const visible = {};
            for (const [key, brief] of Object.entries(briefs)) {
                if (isBriefVisible(brief)) visible[key] = brief;
            }
            return visible;
        }

        async function loadBriefs() {
            try {
                const res = await fetch(`${API_BASE}/content?category=brief&lang=ja`);
                if (!res.ok) throw new Error('Failed to load');
                const data = await res.json();
                const obj = {};
                for (const item of data.items) {
                    const key = item.date ? item.date.slice(0, 10) : item.slug;
                    obj[key] = {
                        title: item.title,
                        html: item.html,
                        content: item.content,
                        publishAt: item.publishAt,
                        expireAt: item.expireAt,
                    };
                }
                briefs = obj;
                renderCalendar();
                renderDateList();
                const visible = getVisibleBriefs();
                const latest = Object.keys(visible).sort().pop();
                if (latest) loadBrief(latest);
            } catch (e) {
                document.getElementById('briefContent').innerHTML = '<div class="empty-state">ブリーフの読み込みに失敗しました。</div>';
            }
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }
        function getFirstDayOfMonth(year, month) {
            return new Date(year, month, 1).getDay();
        }
        function formatDateKey(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }

        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            const label = document.getElementById('calMonthYear');
            const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
            label.textContent = `${currentYear}年 ${monthNames[currentMonth]}`;

            grid.innerHTML = '';
            const days = ['日','月','火','水','木','金','土'];
            days.forEach(d => {
                const el = document.createElement('div');
                el.className = 'day-label';
                el.textContent = d;
                grid.appendChild(el);
            });

            const daysInMonth = getDaysInMonth(currentYear, currentMonth);
            const firstDay = getFirstDayOfMonth(currentYear, currentMonth);
            const prevDays = getDaysInMonth(currentYear, currentMonth - 1);

            for (let i = firstDay - 1; i >= 0; i--) {
                const el = document.createElement('div');
                el.className = 'day other-month';
                el.textContent = prevDays - i;
                grid.appendChild(el);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const key = formatDateKey(currentYear, currentMonth, d);
                const el = document.createElement('div');
                el.className = 'day';
                el.textContent = d;
                if (briefs[key]) {
                    if (isBriefVisible(briefs[key])) {
                        el.classList.add('has-brief');
                        el.onclick = () => loadBrief(key);
                    } else {
                        el.style.color = '#333';
                        el.style.cursor = 'not-allowed';
                        el.title = 'Scheduled / Expired';
                    }
                }
                if (selectedDate === key) {
                    el.classList.add('selected');
                }
                grid.appendChild(el);
            }

            const totalCells = firstDay + daysInMonth;
            const nextDays = (7 - (totalCells % 7)) % 7;
            for (let i = 1; i <= nextDays; i++) {
                const el = document.createElement('div');
                el.className = 'day other-month';
                el.textContent = i;
                grid.appendChild(el);
            }
        }

        function renderDateList() {
            const list = document.getElementById('dateList');
            list.innerHTML = '';
            const visible = getVisibleBriefs();
            const keys = Object.keys(visible).sort().reverse();
            if (keys.length === 0) {
                list.innerHTML = '<div style="color:#555;font-size:0.85rem;">ブリーフはありません</div>';
                return;
            }
            keys.forEach(key => {
                const item = document.createElement('div');
                item.className = 'date-item' + (selectedDate === key ? ' active' : '');
                item.textContent = key;
                item.onclick = () => loadBrief(key);
                list.appendChild(item);
            });
        }

        function loadBrief(key) {
            selectedDate = key;
            const brief = briefs[key];
            document.getElementById('viewerDate').textContent = key;
            document.getElementById('briefContent').innerHTML = brief.html || brief.content || '<div class="empty-state">コンテンツがありません。</div>';
            renderCalendar();
            renderDateList();
        }

        document.getElementById('prevMonth').onclick = () => {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        };
        document.getElementById('nextMonth').onclick = () => {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        };

        loadBriefs();
    </script>
