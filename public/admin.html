<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Juan's World</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XWCEHFL4TE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XWCEHFL4TE');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            min-height: 100vh;
            line-height: 1.6;
        }
        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid #222;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        header h1 {
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
        }
        .user-menu span { color: #666; }
        .user-menu a {
            color: #888;
            text-decoration: none;
        }
        .user-menu a:hover { color: #fff; }
        .section { margin-bottom: 3rem; }
        .section h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #00ff88;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #222;
        }
        th {
            color: #888;
            font-weight: 500;
            font-size: 0.85rem;
        }
        td { color: #ccc; font-size: 0.9rem; }
        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            background: #111;
            color: #ccc;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-small:hover {
            border-color: #00ff88;
            color: #00ff88;
        }
        .btn-danger {
            background: #1a1111;
            border-color: #ff4444;
            color: #ff4444;
        }
        .btn-danger:hover {
            background: #ff4444;
            color: #fff;
        }
        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .form-row input, .form-row select {
            padding: 0.5rem 0.75rem;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .form-row input:focus, .form-row select:focus {
            outline: none;
            border-color: #00ff88;
        }
        .form-row input[type="file"] {
            padding: 0.35rem 0.5rem;
        }
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .flash.error {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        .flash.success {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        #users-loading, #pdfs-loading { color: #666; }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            background: #111;
            border: 1px solid #333;
            border-radius: 3px;
            font-size: 0.8rem;
            color: #888;
            margin-right: 0.35rem;
            margin-bottom: 0.35rem;
        }
        .user-select {
            min-width: 160px;
            background: #111;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 0.4rem;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .user-select:focus {
            outline: none;
            border-color: #00ff88;
        }
        .pdf-title {
            color: #fff;
            font-weight: 500;
        }
        .pdf-meta {
            color: #666;
            font-size: 0.8rem;
        }
        .assignment-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
            min-height: 1.5rem;
        }
        .assignment-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.6rem;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #00ff88;
        }
        .assignment-badge.unassigned {
            background: rgba(102, 102, 102, 0.1);
            border-color: #444;
            color: #888;
        }
        .assignment-editor {
            display: none;
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: #111;
            border: 1px solid #222;
            border-radius: 4px;
        }
        .assignment-editor.active {
            display: block;
        }
        .user-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            margin-bottom: 0.75rem;
        }
        .user-checkboxes label {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.85rem;
            color: #ccc;
            cursor: pointer;
        }
        .user-checkboxes input[type="checkbox"] {
            accent-color: #00ff88;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>Juan's World — Admin</h1>
            <div class="user-menu">
                <span id="admin-username"></span>
                <a href="/reports.html">Reports</a>
                <a href="#" id="logout-link">Logout</a>
            </div>
        </header>

        <div id="message" class="flash"></div>

        <div class="section">
            <h2>Upload PDF Report</h2>
            <form id="upload-form" class="form-row" style="flex-direction: column; align-items: stretch; gap: 0.75rem;">
                <div class="form-row" style="margin-bottom: 0;">
                    <input type="text" id="pdf-title" placeholder="Report title" style="flex: 1;" required>
                    <input type="file" id="pdf-file" accept=".pdf,application/pdf" required>
                </div>
                <div>
                    <button type="submit" class="btn-small">Upload PDF</button>
                </div>
            </form>
        </div>

        <div class="section">
            <h2>PDF Reports</h2>
            <div id="pdfs-loading">Loading...</div>
            <table id="pdfs-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Assigned Users</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pdfs-body"></tbody>
            </table>
            <p id="pdfs-empty" style="display: none; color: #666; font-size: 0.9rem;">No PDF reports uploaded yet.</p>
        </div>

        <div class="section">
            <h2>Users</h2>
            <div id="users-loading">Loading...</div>
            <table id="users-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-body"></tbody>
            </table>
        </div>

        <div class="section">
            <h2>Create User</h2>
            <div class="form-row">
                <input type="text" id="new-username" placeholder="Username">
                <input type="password" id="new-password" placeholder="Password">
                <select id="new-role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="btn-small" onclick="createUser()">Create</button>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        let allUsers = [];
        let allPdfs = [];

        async function requireAdmin() {
            const ok = await requireAuth();
            if (!ok) return false;
            // Verify admin by hitting users endpoint
            try {
                const res = await fetch(`${API_BASE}/users`, { credentials: 'same-origin' });
                if (res.status === 403) {
                    window.location.href = '/reports.html';
                    return false;
                }
                return res.ok;
            } catch {
                return false;
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/users`, { credentials: 'same-origin' });
                if (!response.ok) {
                    if (response.status === 401) window.location.href = '/login.html';
                    if (response.status === 403) {
                        showMessage('Admin access required', 'error');
                    }
                    return;
                }
                const data = await response.json();
                allUsers = data.users;
                renderUsers(data.users);
            } catch (e) {
                console.error(e);
            }
        }

        function renderUsers(users) {
            document.getElementById('users-loading').style.display = 'none';
            const tbody = document.getElementById('users-body');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${escapeHtml(u.username)}</td>
                    <td>${escapeHtml(u.role)}</td>
                    <td>
                        <button class="btn-small" onclick="resetPassword('${escapeHtml(u.username)}')">Reset Password</button>
                        ${u.username !== 'admin' ? `<button class="btn-small btn-danger" onclick="deleteUser('${escapeHtml(u.username)}')">Delete</button>` : ''}
                    </td>
                </tr>
            `).join('');
            document.getElementById('users-table').style.display = 'table';
        }

        async function createUser() {
            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            if (!username || !password) {
                showMessage('Username and password required', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'create', username, password, role }),
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('User created', 'success');
                    document.getElementById('new-username').value = '';
                    document.getElementById('new-password').value = '';
                    loadUsers();
                } else {
                    showMessage(data.error || 'Failed to create user', 'error');
                }
            } catch (e) {
                showMessage('Network error', 'error');
            }
        }

        async function resetPassword(username) {
            const password = prompt(`Enter new password for ${username}:`);
            if (!password) return;

            try {
                const response = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'update', username, password }),
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('Password updated', 'success');
                } else {
                    showMessage(data.error || 'Failed', 'error');
                }
            } catch (e) {
                showMessage('Network error', 'error');
            }
        }

        async function deleteUser(username) {
            if (!confirm(`Delete user ${username}?`)) return;

            try {
                const response = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete', username }),
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('User deleted', 'success');
                    loadUsers();
                } else {
                    showMessage(data.error || 'Failed', 'error');
                }
            } catch (e) {
                showMessage('Network error', 'error');
            }
        }

        /* ─── PDF Reports ─── */

        async function loadPdfs() {
            try {
                const response = await fetch(`${API_BASE}/reports`, { credentials: 'same-origin' });
                if (!response.ok) return;
                const data = await response.json();
                // Filter to only PDFs (admins see all)
                allPdfs = data.reports.filter(r => r.type === 'pdf');
                renderPdfs();
            } catch (e) {
                console.error(e);
            }
        }

        function renderPdfs() {
            document.getElementById('pdfs-loading').style.display = 'none';
            const tbody = document.getElementById('pdfs-body');

            if (allPdfs.length === 0) {
                document.getElementById('pdfs-table').style.display = 'none';
                document.getElementById('pdfs-empty').style.display = 'block';
                return;
            }

            document.getElementById('pdfs-empty').style.display = 'none';
            tbody.innerHTML = allPdfs.map(pdf => {
                const assigned = pdf.assignedUsers || [];

                const badges = assigned.length > 0
                    ? assigned.map(u => `<span class="assignment-badge">${escapeHtml(u)}</span>`).join('')
                    : `<span class="assignment-badge unassigned">Unassigned — no one can see this</span>`;

                const checkboxes = allUsers.map(u => `
                    <label>
                        <input type="checkbox" value="${escapeHtml(u.username)}" ${assigned.includes(u.username) ? 'checked' : ''}>
                        ${escapeHtml(u.username)}
                    </label>
                `).join('');

                return `
                <tr data-id="${escapeHtml(pdf.slug)}">
                    <td>
                        <div class="pdf-title">${escapeHtml(pdf.title)}</div>
                        <div class="pdf-meta">${escapeHtml(pdf.date_formatted)} · ${escapeHtml(pdf.slug)}</div>
                    </td>
                    <td>
                        <div class="assignment-badges" id="badges-${escapeHtml(pdf.slug)}">
                            ${badges}
                        </div>
                        <div class="assignment-editor" id="editor-${escapeHtml(pdf.slug)}">
                            <div class="user-checkboxes">
                                ${checkboxes}
                            </div>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn-small" onclick="saveAssignments('${escapeHtml(pdf.slug)}')">Save Assignments</button>
                                <button class="btn-small" onclick="toggleEditor('${escapeHtml(pdf.slug)}')">Cancel</button>
                            </div>
                        </div>
                    </td>
                    <td style="white-space: nowrap;">
                        <button class="btn-small" id="edit-btn-${escapeHtml(pdf.slug)}" onclick="toggleEditor('${escapeHtml(pdf.slug)}')">Edit</button>
                        <button class="btn-small btn-danger" onclick="deletePdf('${escapeHtml(pdf.slug)}')">Delete</button>
                    </td>
                </tr>
                `;
            }).join('');
            document.getElementById('pdfs-table').style.display = 'table';
        }

        function toggleEditor(id) {
            const editor = document.getElementById(`editor-${CSS.escape(id)}`);
            const btn = document.getElementById(`edit-btn-${CSS.escape(id)}`);
            const isActive = editor.classList.contains('active');

            // Close all other editors first
            document.querySelectorAll('.assignment-editor.active').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('[id^="edit-btn-"]').forEach(el => {
                el.textContent = 'Edit';
            });

            if (!isActive) {
                editor.classList.add('active');
                btn.textContent = 'Close';
            }
        }

        async function saveAssignments(id) {
            const editor = document.getElementById(`editor-${CSS.escape(id)}`);
            const checkboxes = editor.querySelectorAll('input[type="checkbox"]:checked');
            const usernames = Array.from(checkboxes).map(cb => cb.value);

            try {
                const response = await fetch(`${API_BASE}/reports/assign`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, usernames }),
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('Assignments updated', 'success');
                    loadPdfs();
                } else {
                    showMessage(data.error || 'Failed to update assignments', 'error');
                }
            } catch (e) {
                showMessage('Network error', 'error');
            }
        }

        async function deletePdf(id) {
            if (!confirm('Delete this PDF report?')) return;

            try {
                const response = await fetch(`${API_BASE}/reports?id=${encodeURIComponent(id)}`, {
                    method: 'DELETE',
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('PDF deleted', 'success');
                    loadPdfs();
                } else {
                    showMessage(data.error || 'Failed to delete', 'error');
                }
            } catch (e) {
                showMessage('Network error', 'error');
            }
        }

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('pdf-title').value.trim();
            const fileInput = document.getElementById('pdf-file');
            const file = fileInput.files[0];

            if (!title || !file) {
                showMessage('Title and PDF file required', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('title', title);
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE}/reports/upload`, {
                    method: 'POST',
                    body: formData,
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('PDF uploaded successfully', 'success');
                    document.getElementById('upload-form').reset();
                    loadPdfs();
                } else {
                    showMessage(data.error || 'Upload failed', 'error');
                }
            } catch (err) {
                showMessage('Network error', 'error');
            }
        });

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `flash ${type}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            requireAdmin().then(ok => {
                if (ok) {
                    loadUsers();
                    loadPdfs();
                }
            });
        });
    </script>
</body>
</html>
