<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Juan's World</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XWCEHFL4TE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XWCEHFL4TE');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            min-height: 100vh;
            line-height: 1.6;
        }
        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid #222;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        header h1 {
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
        }
        .user-menu span { color: #666; }
        .user-menu a {
            color: #888;
            text-decoration: none;
        }
        .user-menu a:hover { color: #fff; }
        .section { margin-bottom: 3rem; }
        .section h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #00ff88;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #222;
        }
        th {
            color: #888;
            font-weight: 500;
            font-size: 0.85rem;
        }
        td { color: #ccc; font-size: 0.9rem; }
        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            background: #111;
            color: #ccc;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-small:hover {
            border-color: #00ff88;
            color: #00ff88;
        }
        .btn-danger {
            background: #1a1111;
            border-color: #ff4444;
            color: #ff4444;
        }
        .btn-danger:hover {
            background: #ff4444;
            color: #fff;
        }
        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .form-row input, .form-row select {
            padding: 0.5rem 0.75rem;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .form-row input:focus, .form-row select:focus {
            outline: none;
            border-color: #00ff88;
        }
        .flash {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .flash.error {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        .flash.success {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        #users-loading { color: #666; }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>Juan's World — Admin</h1>
            <div class="user-menu">
                <span id="admin-username"></span>
                <a href="/reports.html">Reports</a>
                <a href="#" id="logout-link">Logout</a>
            </div>
        </header>

        <div id="message" class="flash"></div>

        <div class="section">
            <h2>Users</h2>
            <div id="users-loading">Loading...</div>
            <table id="users-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-body"></tbody>
            </table>
        </div>

        <div class="section">
            <h2>Create User</h2>
            <div class="form-row">
                <input type="text" id="new-username" placeholder="Username">
                <input type="password" id="new-password" placeholder="Password">
                <select id="new-role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="btn-small" onclick="createUser()">Create</button>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const API_BASE = '/api';

        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/users`, { credentials: 'same-origin' });
                if (!response.ok) {
                    if (response.status === 401) window.location.href = '/login.html';
                    if (response.status === 403) {
                        showMessage('Admin access required', 'error');
                    }
                    return;
                }
                const data = await response.json();
                renderUsers(data.users);
            } catch (e) {
                console.error(e);
            }
        }

        function renderUsers(users) {
            document.getElementById('users-loading').style.display = 'none';
            const tbody = document.getElementById('users-body');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${escapeHtml(u.username)}</td>
                    <td>${escapeHtml(u.role)}</td>
                    <td>
                        <button class="btn-small" onclick="resetPassword('${escapeHtml(u.username)}')">Reset Password</button>
                        ${u.username !== 'admin' ? `<button class="btn-small btn-danger" onclick="deleteUser('${escapeHtml(u.username)}')">Delete</button>` : ''}
                    </td>
                </tr>
            `).join('');
            document.getElementById('users-table').style.display = 'table';
        }

        async function createUser() {
            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            if (!username || !password) {
                showMessage('Username and password required', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'create', username, password, role }),
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('User created', 'success');
                    document.getElementById('new-username').value = '';
                    document.getElementById('new-password').value = '';
                    loadUsers();
                } else {
                    showMessage(data.error || 'Failed to create user', 'error');
                }
            } catch (e) {
                showMessage('Network error', 'error');
            }
        }

        async function resetPassword(username) {
            const password = prompt(`Enter new password for ${username}:`);
            if (!password) return;

            try {
                const response = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'update', username, password }),
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('Password updated', 'success');
                } else {
                    showMessage(data.error || 'Failed', 'error');
                }
            } catch (e) {
                showMessage('Network error', 'error');
            }
        }

        async function deleteUser(username) {
            if (!confirm(`Delete user ${username}?`)) return;

            try {
                const response = await fetch(`${API_BASE}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete', username }),
                    credentials: 'same-origin'
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('User deleted', 'success');
                    loadUsers();
                } else {
                    showMessage(data.error || 'Failed', 'error');
                }
            } catch (e) {
                showMessage('Network error', 'error');
            }
        }

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `flash ${type}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            requireAuth().then(ok => {
                if (ok) loadUsers();
            });
        });
    </script>
</body>
</html>
