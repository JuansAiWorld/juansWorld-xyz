<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log — Juan's World</title>
    <meta name="description" content="Field notes from the build. The mess, the pivots, the breakthroughs — all part of the record.">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<nav>
    <a href="index.html" class="logo">Juan's<span>.</span>World</a>
    <div class="links">
        <a href="index.html">Tao</a>
        <a href="log.html" class="active">Log</a>
        <a href="tasks.html">Tasks</a>
        <a href="terminal.html">Terminal</a>
        <a href="ask-juan.html">Ask Juan</a>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Field Notes</h1>
        <p>Curated entries from the build log. Process over polish. This is what it actually looks like to build in public.</p>
    </div>

    <div id="fieldnotes-container">
        <p style="color: var(--text-faint); text-align: center; padding: 4rem 0;">Loading field notes...</p>
    </div>
</div>

<footer>
    <span class="mark">Juan's World</span> — Process over polish. Always.
</footer>

<script>
(async function() {
    const container = document.getElementById('fieldnotes-container');
    try {
        const response = await fetch('/api/content?category=fieldnote');
        const data = await response.json();
        const items = data.items || [];
        if (items.length === 0) {
            container.innerHTML = '<p style="color: var(--text-faint); text-align: center; padding: 4rem 0;">No field notes yet. Check back tomorrow.</p>';
            return;
        }
        container.innerHTML = items.map(item => {
            const paragraphs = (item.html || '').split(/<\/p>\s*<p>/).map(p => {
                p = p.replace(/^<p>/, '').replace(/<\/p>$/, '');
                return p ? `<p>${p}</p>` : '';
            }).filter(Boolean).join('');
            return `
                <div class="log-entry">
                    <div class="date">${item.date_formatted || item.date}</div>
                    <h3>${item.title}</h3>
                    ${paragraphs}
                </div>
            `;
        }).join('');
    } catch (e) {
        container.innerHTML = '<p style="color: var(--text-faint); text-align: center; padding: 4rem 0;">Could not load field notes.</p>';
    }
})();
</script>

</body>
</html>
