<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STL Files — Juan's World</title>
    <link rel="stylesheet" href="/css/style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XWCEHFL4TE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XWCEHFL4TE');

    <style>
        .stl-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            background: var(--bg-dark);
            border: 1px solid #00ccff;
            border-radius: 4px;
            font-size: 0.7rem;
            color: #00ccff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            vertical-align: middle;
            margin-left: 0.5rem;
        }
        .file-size {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
            .lang-switch {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            color: #555;
            font-size: 0.85rem;
        }
        .lang-switch a {
            color: #888;
            text-decoration: none;
        }
        .lang-switch a:hover { color: #00ff88; }
</style>
</head>
<body>
    <div class="lang-switch">
        <span style="color:#00ff88;">EN</span> / <a href="/jp/index.html">JP</a>
    </div>
    <div class="container">
        <header>
            <h1>STL Files</h1>
            <div class="user-menu">
                <span id="username">Loading...</span>
                <a href="/reports.html">Reports</a>
                <a href="/admin.html" id="admin-link" style="display: none;">Admin</a>
                <a href="#" id="logout-link">Logout</a>
            </div>
        </header>

        <div id="loading" class="empty-state">Loading files...</div>
        <div id="error" class="empty-state" style="display: none;"></div>

        <div id="stls-list" class="report-list" style="display: none;"></div>

        <div id="pagination" class="pagination" style="display: none;"></div>

    <script src="/js/stls.js"></script>
