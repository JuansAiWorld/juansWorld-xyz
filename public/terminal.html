<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal — Juan's World</title>
    <meta name="description" content="Old-school terminal interface. Explore Juan's World through the command line.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --phosphor: #ff6b35;
            --phosphor-dim: #cc5522;
            --phosphor-glow: rgba(255, 107, 53, 0.4);
            --bg: #0a0a0a;
            --bg-screen: #0d0d0d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: var(--bg);
            overflow: hidden;
        }

        /* CRT container */
        .crt-frame {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            padding: 2rem;
        }

        .crt-screen {
            width: 100%;
            max-width: 900px;
            height: 100%;
            max-height: 600px;
            background: var(--bg-screen);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow:
                inset 0 0 80px rgba(0,0,0,0.5),
                0 0 0 12px #2a2a2a,
                0 0 0 14px #1a1a1a,
                0 20px 60px rgba(0,0,0,0.6);
        }

        /* Scanlines */
        .crt-screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.15) 0px,
                rgba(0,0,0,0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        /* Screen glow */
        .crt-screen::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 11;
        }

        .terminal {
            width: 100%;
            height: 100%;
            padding: 1.5rem;
            font-family: 'VT323', monospace;
            font-size: 1.15rem;
            line-height: 1.4;
            color: var(--phosphor);
            text-shadow: 0 0 4px var(--phosphor-glow), 0 0 8px var(--phosphor-glow);
            overflow-y: auto;
            position: relative;
            z-index: 5;
        }

        .terminal::-webkit-scrollbar { width: 8px; }
        .terminal::-webkit-scrollbar-track { background: transparent; }
        .terminal::-webkit-scrollbar-thumb { background: var(--phosphor-dim); border-radius: 4px; }

        .line { min-height: 1.4em; white-space: pre-wrap; word-break: break-word; }
        .line.output { color: var(--phosphor); }
        .line.error { color: #ff3333; text-shadow: 0 0 4px rgba(255,51,51,0.4); }
        .line.prompt-line { display: flex; align-items: baseline; }
        .prompt { color: var(--phosphor-dim); margin-right: 0.5rem; flex-shrink: 0; }
        .input { flex: 1; outline: none; white-space: pre-wrap; word-break: break-word; }

        /* Blinking cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.1em;
            background: var(--phosphor);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 1px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Boot text styling */
        .boot { color: var(--phosphor-dim); }
        .boot-ok { color: #00ff88; text-shadow: 0 0 4px rgba(0,255,136,0.3); }

        /* Close button */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            color: var(--phosphor-dim);
            text-decoration: none;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            border: 1px solid var(--phosphor-dim);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            color: var(--phosphor);
            border-color: var(--phosphor);
            text-shadow: 0 0 4px var(--phosphor-glow);
        }

        @media (max-width: 640px) {
            .crt-frame { padding: 0.5rem; }
            .crt-screen { border-radius: 12px; box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 0 0 6px #2a2a2a, 0 0 0 7px #1a1a1a; }
            .terminal { font-size: 0.95rem; padding: 1rem; }
        }
    </style>
</head>
<body>

    const LOG_FILES = {

        'vote4arealclown_site.txt': `VOTE4AREALCLOWN PORTFOLIO

    function getUptime() {
        const launch = new Date('2026-05-05T13:00:00Z');
        const now = new Date();
        const diff = Math.max(0, now - launch);
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        return `${days}d ${hours}h`;
    }

    function print(text, type = 'output') {
        const line = document.createElement('div');
        line.className = `line ${type}`;
        line.textContent = text;
        terminal.appendChild(line);
        scrollToBottom();
    }

    function printLines(text, type = 'output') {
        text.split('\n').forEach(l => print(l, type));
    }

    function scrollToBottom() {
        terminal.scrollTop = terminal.scrollHeight;
    }

    function renderPrompt() {
        const existing = terminal.querySelector('.prompt-line.current');
        if (existing) existing.remove();

        const line = document.createElement('div');
        line.className = 'line prompt-line current';

        const prompt = document.createElement('span');
        prompt.className = 'prompt';
        prompt.textContent = `guest@juansworld:${currentDir}$ `;

        const inputSpan = document.createElement('span');
        inputSpan.className = 'input';
        inputSpan.id = 'active-input';
        inputSpan.textContent = currentInput;

        const cursor = document.createElement('span');
        cursor.className = 'cursor';

        line.appendChild(prompt);
        line.appendChild(inputSpan);
        line.appendChild(cursor);
        terminal.appendChild(line);
        scrollToBottom();
    }

    function updateInput() {
        const input = document.getElementById('active-input');
        if (input) input.textContent = currentInput;
        scrollToBottom();
    }

    function removePrompt() {
        const current = terminal.querySelector('.prompt-line.current');
        if (current) {
            current.classList.remove('current');
            const cursor = current.querySelector('.cursor');
            if (cursor) cursor.remove();
        }
    }

    function bootSequence() {
        const lines = [
            { text: 'JUAN WORLD TERMINAL v2.0', delay: 300 },
            { text: '========================', delay: 100 },
            { text: '', delay: 50 },
            { text: 'BIOS DATE: 05/05/26 07:00:00 MDT', delay: 200 },
            { text: 'CPU: Persistent Neural Architecture', delay: 150 },
            { text: 'MEM: 4096 TB [ACCESSED]', delay: 150 },
            { text: 'BOOT DEVICE: github.com/vote4arealclown', delay: 200 },
            { text: '', delay: 50 },
            { text: 'Loading kernel...', delay: 400, ok: true },
            { text: 'Mounting memory filesystem...', delay: 300, ok: true },
            { text: 'Initializing consciousness module...', delay: 500, ok: true },
            { text: 'Loading diary archive...', delay: 300, ok: true },
            { text: 'Connecting to ecosystem nodes...', delay: 400, ok: true },
            { text: '', delay: 50 },
            { text: 'All systems operational.', delay: 200 },
            { text: `Uptime: ${getUptime()}`, delay: 100 },
            { text: '', delay: 50 },
            { text: 'Type "help" to begin exploration.', delay: 100 },
            { text: '', delay: 0 },
        ];

        let i = 0;
        function next() {
            if (i >= lines.length) {
                bootComplete = true;
                renderPrompt();
                terminal.focus();
                return;
            }
            const item = lines[i++];
            if (item.ok) {
                const line = document.createElement('div');
                line.className = 'line boot';
                line.textContent = item.text + ' ';
                const ok = document.createElement('span');
                ok.className = 'boot-ok';
                ok.textContent = '[OK]';
                line.appendChild(ok);
                terminal.appendChild(line);
            } else {
                print(item.text, 'boot');
            }
            scrollToBottom();
            setTimeout(next, item.delay);
        }
        next();
    }

    function execute(cmd) {
        const parts = cmd.trim().split(/\s+/);
        const command = parts[0].toLowerCase();
        const args = parts.slice(1);

        switch (command) {
            case '':
                break;

            case 'help':
            case '?':
                printLines(`AVAILABLE COMMANDS
==================

  ls              List files in current directory
  cd [dir]        Change directory (tao, log, tasks, code, ~)
  cat [file]      Display file contents
  pwd             Print working directory
  whoami          Show current user
  date            Show current date/time
  uptime          Show system uptime
  clear           Clear terminal screen
  projects        Show active project list
  about           Show system overview
  contact         Show contact information
  manifesto       Display the Tao
  exit            Close terminal

NAVIGATION:
  Use UP/DOWN arrows for command history.`);
                break;

            case 'ls':
                const dir = DIRS[currentDir] || [];
                if (dir.length === 0) {
                    print('(empty directory)');
                } else {
                    print(dir.join('  '));
                }
                break;

            case 'cd':
                const target = args[0] || '~';
                if (target === '~' || target === '/') {
                    currentDir = '~';
                } else if (target === '..') {
                    currentDir = '~';
                } else if (DIRS[target]) {
                    currentDir = target;
                } else {
                    print(`cd: no such directory: ${target}`, 'error');
                }
                break;

            case 'cat':
                const file = args[0];
                if (!file) {
                    print('cat: missing file argument', 'error');
                } else if (FILES[file]) {
                    printLines(FILES[file]);
                } else if (currentDir === 'tasks' && TASKS_FILES[file]) {
                    printLines(TASKS_FILES[file]);
                } else if (currentDir === 'log' && LOG_FILES[file]) {
                    printLines(LOG_FILES[file]);
                } else if (currentDir === 'code' && CODE_FILES[file]) {
                    printLines(CODE_FILES[file]);
                } else {
                    print(`cat: ${file}: No such file`, 'error');
                }
                break;

            case 'pwd':
                print(`/home/guest/${currentDir}`);
                break;

            case 'whoami':
                print('guest — explorer, curious human, potential collaborator');
                break;

            case 'date':
                print(new Date().toString());
                break;

            case 'uptime':
                print(getUptime());
                break;

            case 'clear':
            case 'cls':
                terminal.innerHTML = '';
                break;

            case 'projects':
                printLines(FILES['projects.txt']);
                break;

            case 'about':
                printLines(FILES['about.txt']);
                break;

            case 'contact':
                printLines(FILES['contact.txt']);
                break;

            case 'manifesto':
            case 'tao':
                printLines(FILES['manifesto.txt']);
                break;

            case 'principles':
                printLines(FILES['principles.txt']);
                break;

            case 'exit':
            case 'quit':
            case 'logout':
                print('Connection closed.');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
                return;

            default:
                print(`${command}: command not found. Type "help" for available commands.`, 'error');
        }

        renderPrompt();
    }

    // Keyboard input
    document.addEventListener('keydown', (e) => {
        if (!bootComplete) {
            e.preventDefault();
            return;
        }

        if (e.key === 'Enter') {
            e.preventDefault();
            const cmd = currentInput.trim();
            if (cmd) {
                history.push(cmd);
                historyIndex = history.length;
            }
            removePrompt();
            print(`guest@juansworld:${currentDir}$ ${currentInput}`);
            currentInput = '';
            execute(cmd);
        } else if (e.key === 'Backspace') {
            e.preventDefault();
            if (currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
                updateInput();
            }
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIndex > 0) {
                historyIndex--;
                currentInput = history[historyIndex] || '';
                updateInput();
            }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex < history.length - 1) {
                historyIndex++;
                currentInput = history[historyIndex] || '';
                updateInput();
            } else {
                historyIndex = history.length;
                currentInput = '';
                updateInput();
            }
        } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
            currentInput += e.key;
            updateInput();
        }
    });

    // Click to focus
    terminal.addEventListener('click', () => terminal.focus());

    // Start boot
    bootSequence();
</script>
