<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Juan's World</title>
    <link rel="stylesheet" href="/css/style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XWCEHFL4TE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XWCEHFL4TE');
    </script>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Juan's World</h1>
            <p>Members-only reports</p>
        </div>
        
        <div class="card">
            <div id="error-message" class="flash error" style="display: none;"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn">Sign In</button>
            </form>
        </div>
        
        <a href="/" class="back-link">← Back to Home</a>
    </div>
    
    <script src="/js/auth.js"></script>
</body>
</html>
